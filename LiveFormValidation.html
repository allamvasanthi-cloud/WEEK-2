<!DOCTYPE html>
<html>
<head>
    <title>Live Form Validation</title>
</head>
<body>

    <h2>Registration Form</h2>

    <!-- Name -->
    Name: <br>
    <input type="text" id="name" onchange="validateName()">
    <div id="nameMsg"></div>
    <br><br>

    <!-- Email -->
    Email: <br>
    <input type="text" id="email" onchange="validateEmail()">
    <div id="emailMsg"></div>
    <br><br>

    <!-- Age -->
    Age: <br>
    <input type="number" id="age" onchange="validateAge()">
    <div id="ageMsg"></div>
    <br><br>

    <!-- Submit Button -->
    <button onclick="submitForm()">Register</button>

    <p id="result"></p>

    <script>
        // Validate Name
        function validateName() {
            let name = document.getElementById("name").value;
            let msg = document.getElementById("nameMsg");

            if (name === "") {
                msg.innerText = "❌ Name cannot be empty";
                msg.style.color = "red";
                return false;
            } else {
                msg.innerText = "✅ Valid name";
                msg.style.color = "green";
                return true;
            }
        }

        // Validate Email
        function validateEmail() {
            let email = document.getElementById("email").value;
            let msg = document.getElementById("emailMsg");

            if (!email.includes("@")) {
                msg.innerText = "❌ Email must contain @";
                msg.style.color = "red";
                return false;
            } else {
                msg.innerText = "✅ Valid email";
                msg.style.color = "green";
                return true;
            }
        }

        // Validate Age
        function validateAge() {
            let age = document.getElementById("age").value;
            let msg = document.getElementById("ageMsg");

            if (age <= 18 || age === "") {
                msg.innerText = "❌ Age must be greater than 18";
                msg.style.color = "red";
                return false;
            } else {
                msg.innerText = "✅ Valid age";
                msg.style.color = "green";
                return true;
            }
        }

        // Submit Form
        function submitForm() {
            let validName = validateName();
            let validEmail = validateEmail();
            let validAge = validateAge();

            if (validName && validEmail && validAge) {
                let user = {
                    name: document.getElementById("name").value,
                    email: document.getElementById("email").value,
                    age: document.getElementById("age").value
                };

                // Store in sessionStorage
                sessionStorage.setItem("userData", JSON.stringify(user));

                document.getElementById("result").innerText =
                    "🎉 Registration successful! Data saved in sessionStorage.";
            } else {
                document.getElementById("result").innerText =
                    "⚠️ Please fix errors before submitting.";
            }
        }
    </script>

</body>
</html>
