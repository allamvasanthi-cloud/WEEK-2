<!DOCTYPE html>
<html>
<head>
    <title>Mini Expense Tracker</title>
</head>
<body>

<h2>💰 Mini Expense Tracker</h2>

<!-- Inputs -->
Title: <br>
<input type="text" id="title"><br><br>

Amount: <br>
<input type="number" id="amount"><br><br>

Date: <br>
<input type="date" id="date"><br><br>

<!-- Buttons -->
<button onclick="addExpense()">Add Expense</button>
<button onclick="viewExpenses()">View Expenses</button>
<button onclick="deleteAll()">Delete All</button>

<h3>📋 Expense List</h3>
<ul id="list"></ul>

<script>
/* DATABASE CREATION */
let db = openDatabase("ExpenseDB", "1.0", "Expense Tracker", 2 * 1024 * 1024);

// Create table
db.transaction(function(tx) {
    tx.executeSql(
        "CREATE TABLE IF NOT EXISTS expenses (id INTEGER PRIMARY KEY AUTOINCREMENT, title TEXT, amount REAL, date TEXT)",
        [],
        function() { console.log("Table ready"); },
        function(tx, error) { console.log("Table error:", error.message); }
    );
});

/*ADD EXPENSE*/
function addExpense() {
    let title = document.getElementById("title").value;
    let amount = document.getElementById("amount").value;
    let date = document.getElementById("date").value;

    if (!title || !amount || !date) {
        alert("Fill all fields");
        return;
    }

    db.transaction(function(tx) {
        tx.executeSql(
            "INSERT INTO expenses (title, amount, date) VALUES (?, ?, ?)",
            [title, amount, date],
            function() {
                alert("Expense added!");
                viewExpenses();
            },
            function(tx, error) {
                alert("Insert error: " + error.message);
            }
        );
    }, function(error) {
        alert("Transaction error: " + error.message);
    });
}

/*VIEW EXPENSES*/
function viewExpenses() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    db.transaction(function(tx) {
        tx.executeSql(
            "SELECT * FROM expenses",
            [],
            function(tx, results) {
                for (let i = 0; i < results.rows.length; i++) {
                    let row = results.rows.item(i);

                    let li = document.createElement("li");
                    li.textContent =
                        `${row.title} - ₹${row.amount} - ${row.date}`;
                    list.appendChild(li);
                }
            },
            function(tx, error) {
                console.log("Select error:", error.message);
            }
        );
    });
}

/*DELETE ALL EXPENSES*/
function deleteAll() {
    if (!confirm("Delete all expenses?")) return;

    db.transaction(function(tx) {
        tx.executeSql(
            "DELETE FROM expenses",
            [],
            function() {
                alert("All expenses deleted");
                viewExpenses();
            },
            function(tx, error) {
                alert("Delete error: " + error.message);
            }
        );
    });
}
</script>

</body>
</html>
